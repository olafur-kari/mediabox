<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mediabox — Live TV</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    /* ── AppBar ── */
    .appbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10,14,20,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
    }
    .appbar-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      height: 56px;
      gap: 16px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .brand-icon { font-size: 22px; }
    .brand-name {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.3px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--purple) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Search */
    .search-wrap {
      flex: 1;
      max-width: 520px;
      position: relative;
    }
    .search-icon-l {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--faint);
      font-size: 13px;
      pointer-events: none;
    }
    .search-input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 9px 40px 9px 36px;
      color: var(--text);
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    .search-input::placeholder { color: var(--faint); }
    .search-input:focus {
      border-color: rgba(88,166,255,0.5);
      background: rgba(88,166,255,0.04);
    }
    .search-kbd {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 10px;
      color: var(--faint);
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 4px;
      padding: 2px 6px;
      pointer-events: none;
    }
    .search-dropdown {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 16px 48px rgba(0,0,0,0.5);
      z-index: 300;
      display: none;
    }
    .search-dropdown.open { display: block; }
    .search-results-label {
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--faint);
      padding: 10px 14px 6px;
    }
    .search-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      cursor: pointer;
      transition: background 0.1s;
      border-top: 1px solid rgba(255,255,255,0.03);
    }
    .search-item:hover, .search-item.focused { background: rgba(88,166,255,0.08); }
    .search-item-logo {
      width: 36px;
      height: 24px;
      border-radius: 5px;
      background: rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 700;
      color: var(--muted);
      flex-shrink: 0;
    }
    .search-item-info { flex: 1; min-width: 0; }
    .search-item-name { font-size: 13px; font-weight: 600; }
    .search-item-name em { color: var(--accent); font-style: normal; }
    .search-item-meta { font-size: 11px; color: var(--muted); }
    .search-item-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .search-item-group {
      font-size: 10px;
      color: var(--faint);
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 4px;
      padding: 2px 7px;
    }
    .search-no-results {
      padding: 24px;
      text-align: center;
      color: var(--faint);
      font-size: 13px;
    }
    .search-fav-btn {
      background: none; border: none; cursor: pointer;
      color: var(--faint); font-size: 14px; padding: 2px 4px; line-height: 1;
      transition: color 0.15s;
    }
    .search-fav-btn:hover, .search-fav-btn.on { color: #f5a623; }
    .empty-state-hint { font-size: 12px; color: var(--faint); margin-top: 8px; }
    .empty-state-hint a { color: var(--accent); text-decoration: none; }
    .empty-state-hint a:hover { text-decoration: underline; }

    /* User area */
    .appbar-user {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-left: auto;
      flex-shrink: 0;
    }
    .appbar-username {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }
    .logout-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--muted);
      border-radius: 6px;
      padding: 5px 12px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .logout-btn:hover { background: rgba(255,255,255,0.1); color: var(--text); }

    /* ── Layout ── */
    .layout {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
      display: grid;
      grid-template-columns: 210px 1fr;
      gap: 20px;
    }

    /* ── Sidebar ── */
    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 4px;
      position: sticky;
      top: 76px;
      align-self: start;
      max-height: calc(100vh - 96px);
      overflow-y: auto;
    }
    .sidebar-label {
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--faint);
      padding: 8px 10px 4px;
    }
    .sidebar-div {
      height: 1px;
      background: rgba(255,255,255,0.05);
      margin: 6px 4px;
    }
    .group-item {
      display: flex;
      align-items: center;
      padding: 8px 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
      gap: 8px;
      border: 1px solid transparent;
    }
    .group-item:hover { background: rgba(255,255,255,0.04); }
    .group-item.active {
      background: rgba(88,166,255,0.1);
      border-color: rgba(88,166,255,0.2);
    }
    .group-flag { font-size: 15px; flex-shrink: 0; }
    .group-name { font-size: 12px; font-weight: 500; flex: 1; color: #c9d1d9; }
    .group-item.active .group-name { color: var(--accent); font-weight: 600; }
    .group-count {
      font-size: 10px;
      font-weight: 600;
      color: var(--faint);
      background: rgba(255,255,255,0.05);
      padding: 1px 6px;
      border-radius: 10px;
    }
    .gfav-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 11px;
      color: var(--faint);
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
      padding: 2px;
    }
    .group-item:hover .gfav-btn { opacity: 1; }
    .gfav-btn.on { opacity: 1 !important; color: #f7a832; }

    /* ── Main ── */
    .main { min-width: 0; }

    .now-bar {
      background: linear-gradient(135deg, rgba(88,166,255,0.07), rgba(163,113,247,0.07));
      border: 1px solid rgba(88,166,255,0.18);
      border-radius: 12px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      cursor: pointer;
    }
    .now-bar:hover {
      background: linear-gradient(135deg, rgba(88,166,255,0.12), rgba(163,113,247,0.12));
    }
    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--red);
      box-shadow: 0 0 8px rgba(248,81,73,0.6);
      animation: blink 1.4s ease-in-out infinite;
      flex-shrink: 0;
    }
    .now-info { flex: 1; min-width: 0; }
    .now-label {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--accent);
    }
    .now-name {
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .now-show { font-size: 11px; color: var(--muted); }
    .now-stop {
      background: rgba(248,81,73,0.1);
      border: 1px solid rgba(248,81,73,0.2);
      color: var(--red);
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .now-stop:hover { background: rgba(248,81,73,0.18); }

    /* ── Group section ── */
    .g-section { margin-bottom: 24px; }
    .g-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-bottom: 10px;
      margin-bottom: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .g-flag { font-size: 18px; }
    .g-name { font-size: 13px; font-weight: 700; flex: 1; }
    .g-count { font-size: 10px; color: var(--faint); }
    .g-pin {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
      color: var(--faint);
      transition: color 0.15s, transform 0.15s;
      padding: 4px;
    }
    .g-pin:hover { color: #f7a832; transform: scale(1.2); }
    .g-pin.on { color: #f7a832; }
    .g-toggle {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--faint);
      font-size: 11px;
      padding: 4px;
      transition: color 0.15s;
    }
    .g-toggle:hover { color: var(--muted); }

    /* ── Channel row ── */
    .ch-list { display: flex; flex-direction: column; gap: 3px; }
    .ch-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.04);
      border-radius: 10px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .ch-row:hover {
      border-color: rgba(88,166,255,0.25);
      background: rgba(88,166,255,0.04);
    }
    .ch-row.active {
      border-color: rgba(88,166,255,0.4);
      background: rgba(88,166,255,0.07);
    }
    .ch-logo {
      width: 44px;
      height: 30px;
      border-radius: 6px;
      background: rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
      flex-shrink: 0;
      letter-spacing: 0.3px;
    }
    .ch-info { flex: 1; min-width: 0; }
    .ch-name {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .ch-show {
      font-size: 11px;
      color: var(--muted);
      margin-top: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .ch-badges {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    .backup-badge {
      font-size: 9px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
      background: rgba(163,113,247,0.1);
      color: var(--purple);
      border: 1px solid rgba(163,113,247,0.2);
      white-space: nowrap;
    }
    .ch-live {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      font-weight: 700;
      color: var(--accent);
    }
    .ch-live-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--red);
      animation: blink 1.4s ease-in-out infinite;
    }
    .ch-fav {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 15px;
      color: var(--faint);
      transition: color 0.15s, transform 0.15s;
      padding: 4px;
      flex-shrink: 0;
    }
    .ch-fav:hover { color: #f7a832; transform: scale(1.2); }
    .ch-fav.on { color: #f7a832; }

    /* ── Loading & empty states ── */
    .loading-state {
      text-align: center;
      padding: 60px 24px;
      color: var(--muted);
    }
    .loading-spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255,255,255,0.08);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 16px;
    }
    .empty-state {
      text-align: center;
      padding: 60px 24px;
      color: var(--faint);
      font-size: 14px;
    }
    .empty-state-icon { font-size: 32px; margin-bottom: 12px; }

    /* ── Player modal ── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      backdrop-filter: blur(10px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .overlay.open {
      opacity: 1;
      pointer-events: all;
    }
    .player-box {
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      width: 100%;
      max-width: 900px;
      overflow: hidden;
      transform: scale(0.95);
      transition: transform 0.2s;
    }
    .overlay.open .player-box { transform: scale(1); }

    .player-screen {
      background: #000;
      aspect-ratio: 16/9;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .player-screen video {
      width: 100%;
      height: 100%;
      display: none;
    }
    .spinner-wrap {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--faint);
      background: #000;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(255,255,255,0.08);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    .spinner-text { font-size: 11px; }

    .error-screen {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: #000;
      color: var(--muted);
    }
    .error-screen.show { display: flex; }
    .error-screen-icon { font-size: 32px; }
    .error-screen-msg { font-size: 13px; text-align: center; }
    .try-backup-btn {
      background: rgba(163,113,247,0.12);
      border: 1px solid rgba(163,113,247,0.3);
      color: var(--purple);
      border-radius: 6px;
      padding: 7px 16px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .try-backup-btn:hover { background: rgba(163,113,247,0.2); }

    /* Stream picker */
    .stream-picker {
      padding: 12px 18px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      flex-wrap: wrap;
    }
    .stream-picker-label {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--faint);
      flex-shrink: 0;
    }
    .stream-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
      transition: all 0.15s;
    }
    .stream-btn:hover { background: rgba(255,255,255,0.07); color: var(--text); }
    .stream-btn.active {
      background: rgba(88,166,255,0.12);
      border-color: rgba(88,166,255,0.3);
      color: var(--accent);
    }
    .stream-spacer { flex: 1; }
    .stream-ms { font-size: 10px; color: var(--faint); }

    /* Player bar */
    .player-bar {
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .player-logo {
      width: 52px;
      height: 36px;
      border-radius: 8px;
      background: rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      flex-shrink: 0;
      letter-spacing: 0.3px;
    }
    .player-meta { flex: 1; min-width: 0; }
    .player-name { font-size: 15px; font-weight: 700; }
    .player-show { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .player-fav {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 20px;
      color: var(--faint);
      transition: color 0.15s, transform 0.15s;
      padding: 4px 10px;
    }
    .player-fav:hover { transform: scale(1.2); }
    .player-fav.on { color: #f7a832; }
    .player-close {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--muted);
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    .player-close:hover { background: rgba(255,255,255,0.1); color: var(--text); }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { position: static; max-height: none; flex-direction: row; flex-wrap: wrap; }
      .sidebar-label { display: none; }
      .sidebar-div { display: none; }
    }
  </style>
</head>
<body>

<!-- AppBar -->
<header class="appbar">
  <div class="appbar-inner">
    <div class="brand">
      <span class="brand-icon">📺</span>
      <span class="brand-name">Mediabox</span>
    </div>

    <div class="search-wrap">
      <span class="search-icon-l">🔍</span>
      <input
        class="search-input"
        id="searchInput"
        type="text"
        placeholder="Search channels…  press / to focus"
        autocomplete="off"
      >
      <span class="search-kbd" id="searchKbd">/</span>
      <div class="search-dropdown" id="searchDropdown"></div>
    </div>

    <div class="appbar-user">
      <span class="appbar-username" id="usernameDisplay"></span>
      <form action="/api/auth/logout" method="post">
        <button class="logout-btn" type="submit">Sign out</button>
      </form>
    </div>
  </div>
</header>

<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-label">Browse</div>
    <div class="group-item active" data-group="all" onclick="setGroup('all', this)">
      <span class="group-flag">🌐</span>
      <span class="group-name">All Channels</span>
      <span class="group-count" id="allCount">—</span>
    </div>
    <div class="group-item" data-group="favorites" onclick="setGroup('favorites', this)">
      <span class="group-flag">⭐</span>
      <span class="group-name">Favorites</span>
      <span class="group-count" id="favCount">0</span>
    </div>
    <div class="group-item" data-group="recent" onclick="setGroup('recent', this)">
      <span class="group-flag">🕐</span>
      <span class="group-name">Recently Watched</span>
    </div>
    <div class="sidebar-div"></div>
    <div class="sidebar-label">Groups</div>
    <div id="groupList"></div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="now-bar" id="nowBar" style="display:none" onclick="reopenPlayer(event)">
      <div class="live-dot"></div>
      <div class="now-info">
        <div class="now-label">Now Playing</div>
        <div class="now-name" id="nowName"></div>
        <div class="now-show" id="nowShow"></div>
      </div>
      <button class="now-stop" onclick="stopPlaying()">■ Stop</button>
    </div>

    <div id="channelList">
      <div class="loading-state">
        <div class="loading-spinner"></div>
        <div>Loading channels…</div>
      </div>
    </div>
  </main>
</div>

<!-- Player Modal -->
<div class="overlay" id="overlay" onclick="maybeClose(event)">
  <div class="player-box" onclick="event.stopPropagation()">
    <div class="player-screen">
      <div class="spinner-wrap" id="spinnerWrap">
        <div class="spinner"></div>
        <span class="spinner-text">Loading stream…</span>
      </div>
      <video id="vid" controls playsinline></video>
      <div class="error-screen" id="errorScreen">
        <div class="error-screen-icon">📡</div>
        <div class="error-screen-msg" id="errorMsg">Stream unavailable</div>
        <button class="try-backup-btn" id="tryBackupBtn" style="display:none" onclick="tryNextBackup()">
          Try Backup Stream
        </button>
      </div>
    </div>

    <div class="stream-picker" id="streamPicker"></div>

    <div class="player-bar">
      <div class="player-logo" id="pLogo"></div>
      <div class="player-meta">
        <div class="player-name" id="pName"></div>
        <div class="player-show" id="pShow"></div>
      </div>
      <button class="player-fav" id="pFav" onclick="toggleCurrentFav()">★</button>
      <button class="player-close" onclick="closePlayer()">✕ Close</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/mpegts.js@latest/dist/mpegts.min.js"></script>
<script>
// ── State ────────────────────────────────────────────────────────────────────
let groups = [];           // [{id, name, flag, channels:[...]}]
let allChannels = [];      // flat list
let healthCache = {};      // {url: {health, ms, ...}}
let favorites = new Set(); // channel_ids
let recentIds = [];        // channel_ids ordered newest first
let pinnedGroups = new Set(JSON.parse(localStorage.getItem('mb-pinned-groups') || '[]'));

let activeGroup = 'all';
let currentChannelId = null;
let activeStreamIdx = 0;
let searchFocusIdx = -1;
let hlsInstance = null;

// ── Bootstrap ────────────────────────────────────────────────────────────────
async function init() {
  try {
    const [meResp, chResp, hlthResp, favResp, recentResp] = await Promise.all([
      fetch('/api/me'),
      fetch('/api/channels'),
      fetch('/api/health'),
      fetch('/api/favorites'),
      fetch('/api/recent'),
    ]);

    if (meResp.status === 401) { window.location.href = '/login'; return; }

    const me = await meResp.json();
    document.getElementById('usernameDisplay').textContent = me.username;

    const chData = await chResp.json();
    groups = chData.groups || [];
    allChannels = groups.flatMap(g => g.channels.map(ch => ({...ch, groupId: g.id, groupName: g.name, groupFlag: g.flag})));

    healthCache = await hlthResp.json();
    applyHealthToChannels();

    favorites = new Set(await favResp.json());
    recentIds = await recentResp.json();

    updateSidebar();
    renderGroupList();
    // Auto-select Favorites on load (it's the primary view)
    activeGroup = 'favorites';
    document.querySelectorAll('.group-item').forEach(el => {
      el.classList.toggle('active', el.dataset.group === 'favorites');
    });
    renderChannels();

    // Poll health every 2 minutes
    setInterval(refreshHealth, 120000);
  } catch (err) {
    console.error('Init error:', err);
    document.getElementById('channelList').innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">⚠️</div>
        <div>Failed to load channels. <a href="/login">Sign in again</a></div>
      </div>
    `;
  }
}

async function refreshHealth() {
  try {
    const resp = await fetch('/api/health');
    if (resp.ok) {
      healthCache = await resp.json();
      applyHealthToChannels();
      renderChannels();
      if (currentChannelId) {
        const ch = findChannel(currentChannelId);
        if (ch) renderStreamPicker(ch);
      }
    }
  } catch (_) {}
}

function applyHealthToChannels() {
  for (const ch of allChannels) {
    for (const stream of ch.streams || []) {
      const entry = healthCache[stream.url] || {};
      stream.health = entry.health || 'unknown';
      stream.ms = entry.ms || null;
    }
  }
  // Also update in groups
  for (const g of groups) {
    for (const ch of g.channels) {
      for (const stream of ch.streams || []) {
        const entry = healthCache[stream.url] || {};
        stream.health = entry.health || 'unknown';
        stream.ms = entry.ms || null;
      }
    }
  }
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function findChannel(id) {
  return allChannels.find(c => c.id === id);
}

function healthDot(h) {
  return `<span class="h-dot ${h || 'unknown'}" title="${h || 'unknown'}"></span>`;
}

function healthTag(h, ms) {
  const labels = { green: 'Healthy', yellow: 'Slow', red: 'Down', unknown: 'Unknown' };
  const msStr = ms != null ? `${ms}ms` : '—';
  return `<span class="health-tag ${h || 'unknown'}">${healthDot(h)} ${labels[h] || 'Unknown'}</span><span class="stream-ms">${msStr}</span>`;
}

function bestStreamIdx(streams) {
  const greenIdx = streams.findIndex(s => s.health === 'green');
  if (greenIdx >= 0) return greenIdx;
  const yellowIdx = streams.findIndex(s => s.health === 'yellow');
  if (yellowIdx >= 0) return yellowIdx;
  return 0;
}

function hl(text, q) {
  if (!q) return escHtml(text);
  const escaped = escHtml(text);
  const escapedQ = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return escaped.replace(new RegExp(`(${escapedQ})`, 'gi'), '<em>$1</em>');
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── Sidebar ──────────────────────────────────────────────────────────────────
function updateSidebar() {
  document.getElementById('allCount').textContent = allChannels.length;
  document.getElementById('favCount').textContent = favorites.size;
}

function renderGroupList() {
  const container = document.getElementById('groupList');
  const sorted = [...groups].sort((a, b) => {
    const ap = pinnedGroups.has(a.id) ? 0 : 1;
    const bp = pinnedGroups.has(b.id) ? 0 : 1;
    if (ap !== bp) return ap - bp;
    return a.name.localeCompare(b.name);
  });

  container.innerHTML = sorted.map(g => {
    const isPinned = pinnedGroups.has(g.id);
    const isActive = activeGroup === g.id;
    return `
      <div class="group-item ${isActive ? 'active' : ''}" data-group="${escHtml(g.id)}" onclick="setGroup('${escHtml(g.id)}', this)">
        <span class="group-flag">${g.flag}</span>
        <span class="group-name">${escHtml(g.name)}</span>
        <span class="group-count">${g.channels.length}</span>
        <button class="gfav-btn ${isPinned ? 'on' : ''}"
          onclick="event.stopPropagation(); togglePinGroup('${escHtml(g.id)}')"
          title="${isPinned ? 'Unpin' : 'Pin to top'}">★</button>
      </div>
    `;
  }).join('');
}

function togglePinGroup(gid) {
  if (pinnedGroups.has(gid)) {
    pinnedGroups.delete(gid);
  } else {
    pinnedGroups.add(gid);
  }
  localStorage.setItem('mb-pinned-groups', JSON.stringify([...pinnedGroups]));
  renderGroupList();
}

function setGroup(groupId, el) {
  activeGroup = groupId;
  document.querySelectorAll('.group-item').forEach(e => e.classList.remove('active'));
  if (el) el.classList.add('active');
  renderChannels();
}

// ── Channel list ──────────────────────────────────────────────────────────────
function renderChannels() {
  const list = document.getElementById('channelList');

  let displayGroups;

  if (activeGroup === 'favorites') {
    const favChannels = allChannels.filter(ch => favorites.has(ch.id));
    if (!favChannels.length) {
      list.innerHTML = `<div class="empty-state"><div class="empty-state-icon">☆</div><div>No favorites yet</div><div class="empty-state-hint">Browse <a href="#" onclick="setGroup('all', document.querySelector('[data-group=all]')); return false;">All Channels</a> and tap ★ to add some</div></div>`;
      return;
    }
    displayGroups = [{ id: 'fav-v', name: 'Favorites', flag: '⭐', channels: favChannels, virtual: true }];

  } else if (activeGroup === 'recent') {
    const recentChannels = recentIds.map(id => findChannel(id)).filter(Boolean);
    if (!recentChannels.length) {
      list.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🕐</div><div>Nothing watched yet</div></div>`;
      return;
    }
    displayGroups = [{ id: 'rec-v', name: 'Recently Watched', flag: '🕐', channels: recentChannels, virtual: true }];

  } else if (activeGroup === 'all') {
    displayGroups = [...groups].sort((a, b) => {
      const ap = pinnedGroups.has(a.id) ? 0 : 1;
      const bp = pinnedGroups.has(b.id) ? 0 : 1;
      if (ap !== bp) return ap - bp;
      return a.name.localeCompare(b.name);
    });

  } else {
    const found = groups.find(g => g.id === activeGroup);
    displayGroups = found ? [found] : [];
  }

  if (!displayGroups.length) {
    list.innerHTML = `<div class="empty-state"><div class="empty-state-icon">📺</div><div>No channels found</div></div>`;
    return;
  }

  list.innerHTML = '';
  displayGroups.forEach(group => {
    if (!group.channels.length) return;
    const sortedChannels = group.virtual
      ? group.channels
      : [...group.channels].sort((a, b) => {
          const af = favorites.has(a.id) ? 0 : 1;
          const bf = favorites.has(b.id) ? 0 : 1;
          return af - bf;
        });

    const isPinned = pinnedGroups.has(group.id);
    const sec = document.createElement('div');
    sec.className = 'g-section';
    sec.innerHTML = `
      <div class="g-header">
        <span class="g-flag">${group.flag}</span>
        <span class="g-name">${escHtml(group.name)}</span>
        <span class="g-count">${sortedChannels.length} channel${sortedChannels.length !== 1 ? 's' : ''}</span>
        ${!group.virtual ? `<button class="g-pin ${isPinned ? 'on' : ''}" onclick="togglePinGroup('${escHtml(group.id)}')" title="Pin to top">${isPinned ? '★' : '☆'}</button>` : ''}
        <button class="g-toggle" onclick="toggleCollapse(this, '${escHtml(group.id)}')">▾</button>
      </div>
      <div class="ch-list" id="cl-${escHtml(group.id)}">
        ${sortedChannels.map(ch => renderChannelRow(ch)).join('')}
      </div>
    `;
    list.appendChild(sec);
  });
}

function renderChannelRow(ch) {
  const primaryStream = (ch.streams || [])[0] || {};
  const primaryHealth = primaryStream.health || 'unknown';
  const hasBackups = (ch.streams || []).length > 1;
  const isFav = favorites.has(ch.id);
  const isPlaying = currentChannelId === ch.id;

  return `
    <div class="ch-row ${isPlaying ? 'active' : ''}" onclick="playChannel('${escHtml(ch.id)}')">
      <div class="ch-logo">${escHtml(ch.logo || '')}</div>
      <div class="ch-info">
        <div class="ch-name">${escHtml(ch.name)}</div>
        <div class="ch-show">${escHtml(ch.show || '')}</div>
      </div>
      <div class="ch-badges">
        ${isPlaying ? `<div class="ch-live"><div class="ch-live-dot"></div>LIVE</div>` : ''}
        ${healthDot(primaryHealth)}
        ${hasBackups ? `<span class="backup-badge">+${ch.streams.length - 1} backup</span>` : ''}
      </div>
      <button class="ch-fav ${isFav ? 'on' : ''}"
        onclick="event.stopPropagation(); toggleFav('${escHtml(ch.id)}')"
        title="${isFav ? 'Remove favorite' : 'Add favorite'}">★</button>
    </div>
  `;
}

function toggleCollapse(btn, gid) {
  const el = document.getElementById('cl-' + gid);
  if (!el) return;
  const hidden = el.style.display === 'none';
  el.style.display = hidden ? '' : 'none';
  btn.textContent = hidden ? '▾' : '▸';
}

// ── Favorites ────────────────────────────────────────────────────────────────
async function toggleFav(channelId) {
  if (favorites.has(channelId)) {
    favorites.delete(channelId);
  } else {
    favorites.add(channelId);
  }
  updateSidebar();
  renderChannels();
  if (currentChannelId === channelId) {
    document.getElementById('pFav').className = `player-fav ${favorites.has(channelId) ? 'on' : ''}`;
  }

  try {
    await fetch(`/api/favorites/${channelId}`, { method: 'POST' });
  } catch (_) {}
}

async function toggleFavSearch(channelId, btn) {
  await toggleFav(channelId);
  btn.classList.toggle('on', favorites.has(channelId));
  btn.title = favorites.has(channelId) ? 'Remove favorite' : 'Add to favorites';
}

async function toggleCurrentFav() {
  if (!currentChannelId) return;
  await toggleFav(currentChannelId);
}

// ── Playback ─────────────────────────────────────────────────────────────────
async function playChannel(channelId) {
  const ch = findChannel(channelId);
  if (!ch) return;

  currentChannelId = channelId;
  activeStreamIdx = bestStreamIdx(ch.streams || []);

  // Update recently watched
  recentIds = [channelId, ...recentIds.filter(r => r !== channelId)].slice(0, 10);
  try { await fetch(`/api/recent/${channelId}`, { method: 'POST' }); } catch (_) {}

  // Now bar
  document.getElementById('nowBar').style.display = 'flex';
  document.getElementById('nowName').textContent = ch.name;
  document.getElementById('nowShow').textContent = ch.show || '';

  // Player info
  document.getElementById('pLogo').textContent = ch.logo || '';
  document.getElementById('pName').textContent = ch.name;
  document.getElementById('pShow').textContent = ch.show || '';
  document.getElementById('pFav').className = `player-fav ${favorites.has(channelId) ? 'on' : ''}`;

  renderStreamPicker(ch);
  showSpinner();
  hideError();
  document.getElementById('overlay').classList.add('open');

  renderChannels();

  await loadStream(channelId, activeStreamIdx);
}

async function loadStream(channelId, streamIdx) {
  const ch = findChannel(channelId);
  if (!ch) return;

  const streams = ch.streams || [];
  let url;

  if (streamIdx === activeStreamIdx && streamIdx === bestStreamIdx(streams)) {
    // Let the backend pick best URL
    try {
      const resp = await fetch(`/api/stream/${channelId}`);
      if (resp.ok) {
        const data = await resp.json();
        url = data.url;
      }
    } catch (_) {}
  }

  if (!url && streams[streamIdx]) {
    url = streams[streamIdx].url;
  }

  if (!url) {
    showError('No stream URL available');
    return;
  }

  startHls(url, ch, streamIdx);
}

function startHls(url, ch, streamIdx) {
  const vid = document.getElementById('vid');

  // Destroy existing player instance
  if (hlsInstance) {
    hlsInstance.destroy();
    hlsInstance = null;
  }

  vid.pause();
  vid.src = '';

  showSpinner();
  hideError();

  const isM3u8 = url.includes('.m3u8');
  const streams = ch.streams || [];
  const hasBackup = streams.length > streamIdx + 1;

  const type = url.includes('.m3u8') ? 'mse' : 'mpegts';

  if (mpegts.isSupported()) {
    hlsInstance = mpegts.createPlayer(
      { type, url, isLive: true },
      { enableWorker: false, lazyLoadMaxDuration: 3 * 60, seekType: 'range' }
    );
    hlsInstance.on(mpegts.Events.ERROR, (errType, errDetail, errInfo) => {
      hideSpinner();
      showError('Stream unavailable — network error', hasBackup);
    });
    hlsInstance.attachMediaElement(vid);
    hlsInstance.load();
    vid.style.display = 'block';
    vid.addEventListener('canplay', () => {
      hideSpinner();
      vid.play().catch(() => {});
    }, { once: true });
  } else {
    // Fallback: native (Safari HLS)
    vid.src = url;
    vid.style.display = 'block';
    vid.addEventListener('canplay', () => {
      hideSpinner();
      vid.play().catch(() => {});
    }, { once: true });
    vid.addEventListener('error', () => {
      hideSpinner();
      showError('Stream unavailable', hasBackup);
    }, { once: true });
  }
}

function tryNextBackup() {
  if (!currentChannelId) return;
  const ch = findChannel(currentChannelId);
  if (!ch) return;
  const streams = ch.streams || [];
  const nextIdx = activeStreamIdx + 1;
  if (nextIdx < streams.length) {
    activeStreamIdx = nextIdx;
    renderStreamPicker(ch);
    loadStream(currentChannelId, nextIdx);
  }
}

function switchStream(idx) {
  if (!currentChannelId) return;
  const ch = findChannel(currentChannelId);
  if (!ch) return;
  activeStreamIdx = idx;
  renderStreamPicker(ch);
  loadStream(currentChannelId, idx);
}

function showSpinner() {
  document.getElementById('spinnerWrap').style.display = 'flex';
  document.getElementById('vid').style.display = 'none';
  hideError();
}

function hideSpinner() {
  document.getElementById('spinnerWrap').style.display = 'none';
}

function showError(msg, hasBackup = false) {
  const screen = document.getElementById('errorScreen');
  document.getElementById('errorMsg').textContent = msg;
  const backupBtn = document.getElementById('tryBackupBtn');
  backupBtn.style.display = hasBackup ? 'block' : 'none';
  screen.classList.add('show');
  document.getElementById('vid').style.display = 'none';
}

function hideError() {
  document.getElementById('errorScreen').classList.remove('show');
}

function renderStreamPicker(ch) {
  const picker = document.getElementById('streamPicker');
  const streams = ch.streams || [];

  if (streams.length <= 1) {
    const s = streams[0] || {};
    picker.innerHTML = `
      <span class="stream-picker-label">Stream</span>
      ${healthTag(s.health, s.ms)}
    `;
  } else {
    const activeSt = streams[activeStreamIdx] || {};
    picker.innerHTML = `
      <span class="stream-picker-label">Streams</span>
      ${streams.map((s, i) => `
        <button class="stream-btn ${i === activeStreamIdx ? 'active' : ''}" onclick="switchStream(${i})">
          ${healthDot(s.health)} ${escHtml(s.label)}
        </button>
      `).join('')}
      <span class="stream-spacer"></span>
      ${healthTag(activeSt.health, activeSt.ms)}
    `;
  }
}

function stopPlaying() {
  if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
  const vid = document.getElementById('vid');
  vid.pause();
  vid.src = '';
  currentChannelId = null;
  document.getElementById('nowBar').style.display = 'none';
  renderChannels();
}

function closePlayer() {
  document.getElementById('overlay').classList.remove('open');
}

function reopenPlayer(e) {
  if (e.target.closest('.now-stop')) return;
  if (currentChannelId) document.getElementById('overlay').classList.add('open');
}

function maybeClose(e) {
  if (e.target === document.getElementById('overlay')) closePlayer();
}

// ── Search ────────────────────────────────────────────────────────────────────
const searchInput = document.getElementById('searchInput');
const searchDropdown = document.getElementById('searchDropdown');
const searchKbd = document.getElementById('searchKbd');

searchInput.addEventListener('input', renderDropdown);

searchInput.addEventListener('focus', () => {
  searchKbd.style.display = 'none';
  renderDropdown();
});

searchInput.addEventListener('blur', () => {
  setTimeout(() => {
    searchDropdown.classList.remove('open');
    searchKbd.style.display = '';
    searchFocusIdx = -1;
  }, 160);
});

searchInput.addEventListener('keydown', e => {
  const items = searchDropdown.querySelectorAll('.search-item');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    moveFocus(1, items);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    moveFocus(-1, items);
  } else if (e.key === 'Enter') {
    const focused = searchDropdown.querySelector('.search-item.focused');
    if (focused) focused.click();
  } else if (e.key === 'Escape') {
    searchInput.blur();
  }
});

function moveFocus(d, items) {
  searchFocusIdx = Math.max(-1, Math.min(items.length - 1, searchFocusIdx + d));
  items.forEach((el, i) => el.classList.toggle('focused', i === searchFocusIdx));
}

function scoreChannel(ch, q) {
  // Strip country prefix (e.g. "NO: NRK 1 HD" → "nrk 1 hd") for matching
  const stripped = ch.name.toLowerCase().replace(/^[a-z]{2}\s*:\s*/, '');
  const full = ch.name.toLowerCase();
  const show = (ch.show || '').toLowerCase();
  const group = (ch.groupName || '').toLowerCase();

  if (stripped === q || full === q) return 100;
  if (stripped.startsWith(q)) return 80;
  if (full.startsWith(q)) return 70;
  if (stripped.includes(q)) return 60;
  if (full.includes(q)) return 50;
  if (show.includes(q)) return 30;
  if (group.includes(q)) return 10;

  // Word-boundary match: any word in the name starts with query
  const words = stripped.split(/\s+/);
  if (words.some(w => w.startsWith(q))) return 55;

  return 0;
}

function renderDropdown() {
  const q = searchInput.value.trim().toLowerCase();
  if (!q) { searchDropdown.classList.remove('open'); return; }
  searchFocusIdx = -1;

  const results = allChannels
    .map(ch => ({ ch, score: scoreChannel(ch, q) }))
    .filter(x => x.score > 0)
    .sort((a, b) => b.score - a.score)
    .slice(0, 12)
    .map(x => x.ch);

  if (!results.length) {
    searchDropdown.innerHTML = `<div class="search-no-results">No channels found for "<strong>${escHtml(q)}</strong>"</div>`;
  } else {
    searchDropdown.innerHTML = `
      <div class="search-results-label">${results.length} channel${results.length > 1 ? 's' : ''}</div>
      ${results.map(ch => {
        const best = (ch.streams || [])[bestStreamIdx(ch.streams || [])] || {};
        return `
          <div class="search-item" onclick="selectSearch('${escHtml(ch.id)}')">
            <div class="search-item-logo">${escHtml(ch.logo || '')}</div>
            <div class="search-item-info">
              <div class="search-item-name">${hl(ch.name.replace(/^[A-Z]{2}\s*:\s*/, ''), q)}</div>
              <div class="search-item-meta">${escHtml(ch.show || ch.groupName || '')}</div>
            </div>
            <div class="search-item-right">
              ${healthDot(best.health)}
              <span class="search-item-group">${ch.groupFlag || ''} ${escHtml(ch.groupName || '')}</span>
              <button class="search-fav-btn ${favorites.has(ch.id) ? 'on' : ''}"
                onclick="event.stopPropagation(); toggleFavSearch('${escHtml(ch.id)}', this)"
                title="${favorites.has(ch.id) ? 'Remove favorite' : 'Add to favorites'}">★</button>
            </div>
          </div>
        `;
      }).join('')}
    `;
  }
  searchDropdown.classList.add('open');
}

function selectSearch(channelId) {
  searchInput.value = '';
  searchDropdown.classList.remove('open');
  searchInput.blur();
  playChannel(channelId);
}

// ── Keyboard shortcuts ────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === '/' && document.activeElement !== searchInput) {
    e.preventDefault();
    searchInput.focus();
  }
  if (e.key === 'Escape') {
    if (document.getElementById('overlay').classList.contains('open')) {
      closePlayer();
    } else if (document.activeElement === searchInput) {
      searchInput.blur();
    }
  }
});

// ── Start ─────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
