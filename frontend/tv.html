<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mediabox — Live TV</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    /* ── AppBar ── */
    .appbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10,14,20,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
    }
    .appbar-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      height: 56px;
      gap: 16px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .brand-icon { font-size: 22px; }
    .brand-name {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.3px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--purple) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Search */
    .search-wrap {
      flex: 1;
      max-width: 520px;
      position: relative;
    }
    .search-icon-l {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--faint);
      font-size: 13px;
      pointer-events: none;
    }
    .search-input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 9px 40px 9px 36px;
      color: var(--text);
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    .search-input::placeholder { color: var(--faint); }
    .search-input:focus {
      border-color: rgba(88,166,255,0.5);
      background: rgba(88,166,255,0.04);
    }
    .search-kbd {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 10px;
      color: var(--faint);
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 4px;
      padding: 2px 6px;
      pointer-events: none;
    }
    .search-dropdown {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 16px 48px rgba(0,0,0,0.5);
      z-index: 300;
      display: none;
    }
    .search-dropdown.open { display: block; }
    .search-results-label {
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--faint);
      padding: 10px 14px 6px;
    }
    .search-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      cursor: pointer;
      transition: background 0.1s;
      border-top: 1px solid rgba(255,255,255,0.03);
    }
    .search-item:hover, .search-item.focused { background: rgba(88,166,255,0.08); }
    .search-item-logo {
      width: 36px;
      height: 24px;
      border-radius: 5px;
      background: rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 700;
      color: var(--muted);
      flex-shrink: 0;
    }
    .search-item-info { flex: 1; min-width: 0; }
    .search-item-name { font-size: 13px; font-weight: 600; }
    .search-item-name em { color: var(--accent); font-style: normal; }
    .search-item-meta { font-size: 11px; color: var(--muted); }
    .search-item-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .search-item-group {
      font-size: 10px;
      color: var(--faint);
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 4px;
      padding: 2px 7px;
    }
    .search-no-results {
      padding: 24px;
      text-align: center;
      color: var(--faint);
      font-size: 13px;
    }
    .epg-time {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 4px;
      white-space: nowrap;
      background: rgba(139,148,158,0.1);
      color: var(--muted);
      border: 1px solid rgba(139,148,158,0.15);
    }
    .epg-time.live {
      background: rgba(248,81,73,0.1);
      color: #f85149;
      border-color: rgba(248,81,73,0.25);
    }
    .search-fav-btn {
      background: none; border: none; cursor: pointer;
      color: var(--faint); font-size: 14px; padding: 2px 4px; line-height: 1;
      transition: color 0.15s;
    }
    .search-fav-btn:hover, .search-fav-btn.on { color: #f5a623; }
    .empty-state-hint { font-size: 12px; color: var(--faint); margin-top: 8px; }
    .empty-state-hint a { color: var(--accent); text-decoration: none; }
    .empty-state-hint a:hover { text-decoration: underline; }

    /* Add Channel Modal */
    .add-ch-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.6); z-index: 200;
      align-items: center; justify-content: center;
    }
    .add-ch-overlay.open { display: flex; }
    .add-ch-box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 28px; width: 400px; max-width: 90vw;
      display: flex; flex-direction: column; gap: 10px;
    }
    .add-ch-title { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .add-ch-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
    .add-ch-input {
      background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
      padding: 9px 12px; font-size: 14px; color: var(--text); width: 100%; box-sizing: border-box;
      outline: none;
    }
    .add-ch-input:focus { border-color: var(--accent); }
    .add-ch-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
    .add-ch-cancel {
      background: none; border: 1px solid var(--border); border-radius: 8px;
      padding: 8px 16px; color: var(--muted); cursor: pointer; font-size: 13px;
    }
    .add-ch-submit {
      background: var(--accent); border: none; border-radius: 8px;
      padding: 8px 18px; color: #fff; cursor: pointer; font-size: 13px; font-weight: 600;
    }
    .add-ch-submit:hover { opacity: 0.88; }
    .search-add-btn-inline {
      background: rgba(88,166,255,0.1); border: 1px solid rgba(88,166,255,0.25);
      border-radius: 6px; color: var(--accent); cursor: pointer;
      font-size: 11px; font-weight: 600; padding: 3px 10px; white-space: nowrap;
    }
    .search-add-btn-inline:hover { background: rgba(88,166,255,0.2); }
    .search-add-row {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 14px; cursor: pointer;
      border-top: 1px solid rgba(255,255,255,0.03);
      color: var(--accent); font-size: 13px;
      transition: background 0.1s;
    }
    .search-add-row:hover { background: rgba(88,166,255,0.08); }
    .search-add-icon {
      width: 36px; height: 24px; border-radius: 5px;
      background: rgba(88,166,255,0.1); border: 1px dashed rgba(88,166,255,0.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0;
    }

    /* User area */
    .appbar-user {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-left: auto;
      flex-shrink: 0;
    }
    .appbar-username {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }
    .logout-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--muted);
      border-radius: 6px;
      padding: 5px 12px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .logout-btn:hover { background: rgba(255,255,255,0.1); color: var(--text); }
    .settings-btn {
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 16px; padding: 4px 8px; border-radius: 6px; transition: color 0.15s;
    }
    .settings-btn:hover { color: var(--text); }
    .active-users-badge {
      display: flex; align-items: center; gap: 5px;
      font-size: 11px; color: var(--muted);
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 20px; padding: 3px 10px;
      white-space: nowrap;
    }
    .active-users-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #4caf50;
      box-shadow: 0 0 5px #4caf5088;
    }
    .settings-box { width: 480px; }
    .user-list { display: flex; flex-direction: column; gap: 6px; max-height: 320px; overflow-y: auto; }
    .user-row {
      display: flex; align-items: center; gap: 10px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 12px;
    }
    .user-row-name { font-size: 13px; font-weight: 500; }
    .user-row-info { flex: 1; display: flex; flex-direction: column; gap: 2px; }
    .user-row-meta { font-size: 11px; color: var(--muted); }
    .user-row-logins { font-size: 10px; color: var(--faint); }
    .user-row-admin { font-size: 10px; color: var(--accent); font-weight: 600;
      background: rgba(88,166,255,0.1); border: 1px solid rgba(88,166,255,0.2);
      border-radius: 4px; padding: 1px 6px; }
    .user-del-btn { background: none; border: none; color: var(--faint); cursor: pointer; font-size: 14px; padding: 2px 6px; }
    .user-del-btn:hover { color: #f85149; }
    .new-user-result {
      background: rgba(63,185,80,0.08); border: 1px solid rgba(63,185,80,0.2);
      border-radius: 8px; padding: 12px; margin-top: 4px;
    }
    .new-user-creds { font-size: 13px; margin-bottom: 8px; }
    .new-user-creds strong { color: var(--text); }
    .copy-btn {
      background: rgba(88,166,255,0.1); border: 1px solid rgba(88,166,255,0.25);
      border-radius: 6px; color: var(--accent); cursor: pointer;
      font-size: 11px; font-weight: 600; padding: 4px 12px;
    }
    .copy-btn:hover { background: rgba(88,166,255,0.2); }

    /* ── Layout ── */
    .layout {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
      display: grid;
      grid-template-columns: 210px 1fr;
      gap: 20px;
    }

    /* ── Sidebar ── */
    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 4px;
      position: sticky;
      top: 76px;
      align-self: start;
      max-height: calc(100vh - 96px);
      overflow-y: auto;
    }
    .sidebar-label {
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--faint);
      padding: 8px 10px 4px;
    }
    .sidebar-div {
      height: 1px;
      background: rgba(255,255,255,0.05);
      margin: 6px 4px;
    }
    .group-item {
      display: flex;
      align-items: center;
      padding: 8px 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
      gap: 8px;
      border: 1px solid transparent;
    }
    .group-item:hover { background: rgba(255,255,255,0.04); }
    .group-item.active {
      background: rgba(88,166,255,0.1);
      border-color: rgba(88,166,255,0.2);
    }
    .group-flag { font-size: 15px; flex-shrink: 0; }
    .group-name { font-size: 12px; font-weight: 500; flex: 1; color: #c9d1d9; }
    .group-item.active .group-name { color: var(--accent); font-weight: 600; }
    .group-count {
      font-size: 10px;
      font-weight: 600;
      color: var(--faint);
      background: rgba(255,255,255,0.05);
      padding: 1px 6px;
      border-radius: 10px;
    }
    .gfav-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 11px;
      color: var(--faint);
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
      padding: 2px;
    }
    .group-item:hover .gfav-btn { opacity: 1; }
    .gfav-btn.on { opacity: 1 !important; color: #f7a832; }

    /* ── Main ── */
    .main { min-width: 0; }

    .now-bar {
      background: linear-gradient(135deg, rgba(88,166,255,0.07), rgba(163,113,247,0.07));
      border: 1px solid rgba(88,166,255,0.18);
      border-radius: 12px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      cursor: pointer;
    }
    .now-bar:hover {
      background: linear-gradient(135deg, rgba(88,166,255,0.12), rgba(163,113,247,0.12));
    }
    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--red);
      box-shadow: 0 0 8px rgba(248,81,73,0.6);
      animation: blink 1.4s ease-in-out infinite;
      flex-shrink: 0;
    }
    .now-info { flex: 1; min-width: 0; }
    .now-label {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--accent);
    }
    .now-name {
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .now-show { font-size: 11px; color: var(--muted); }
    .now-stop {
      background: rgba(248,81,73,0.1);
      border: 1px solid rgba(248,81,73,0.2);
      color: var(--red);
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .now-stop:hover { background: rgba(248,81,73,0.18); }

    /* ── Group section ── */
    .g-section { margin-bottom: 24px; }
    .g-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-bottom: 10px;
      margin-bottom: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .g-flag { font-size: 18px; }
    .g-name { font-size: 13px; font-weight: 700; flex: 1; }
    .g-count { font-size: 10px; color: var(--faint); }
    .g-pin {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
      color: var(--faint);
      transition: color 0.15s, transform 0.15s;
      padding: 4px;
    }
    .g-pin:hover { color: #f7a832; transform: scale(1.2); }
    .g-pin.on { color: #f7a832; }
    .g-toggle {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--faint);
      font-size: 11px;
      padding: 4px;
      transition: color 0.15s;
    }
    .g-toggle:hover { color: var(--muted); }

    /* ── Channel row ── */
    .ch-list { display: flex; flex-direction: column; gap: 3px; }
    .ch-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.04);
      border-radius: 10px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .ch-row:hover {
      border-color: rgba(88,166,255,0.25);
      background: rgba(88,166,255,0.04);
    }
    .ch-row.active {
      border-color: rgba(88,166,255,0.4);
      background: rgba(88,166,255,0.07);
    }
    .ch-logo {
      width: 44px;
      height: 30px;
      border-radius: 6px;
      background: rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
      flex-shrink: 0;
      letter-spacing: 0.3px;
    }
    .ch-info { flex: 1; min-width: 0; }
    .ch-name {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .ch-show {
      font-size: 11px;
      color: var(--muted);
      margin-top: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .ch-badges {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    .backup-badge {
      font-size: 9px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
      background: rgba(163,113,247,0.1);
      color: var(--purple);
      border: 1px solid rgba(163,113,247,0.2);
      white-space: nowrap;
    }
    .ch-live {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      font-weight: 700;
      color: var(--accent);
    }
    .ch-live-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--red);
      animation: blink 1.4s ease-in-out infinite;
    }
    .ch-fav {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 15px;
      color: var(--faint);
      transition: color 0.15s, transform 0.15s;
      padding: 4px;
      flex-shrink: 0;
    }
    .ch-fav:hover { color: #f7a832; transform: scale(1.2); }
    .ch-fav.on { color: #f7a832; }

    /* ── Loading & empty states ── */
    .loading-state {
      text-align: center;
      padding: 60px 24px;
      color: var(--muted);
    }
    .loading-spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255,255,255,0.08);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 16px;
    }
    .empty-state {
      text-align: center;
      padding: 60px 24px;
      color: var(--faint);
      font-size: 14px;
    }
    .empty-state-icon { font-size: 32px; margin-bottom: 12px; }

    /* ── Player modal ── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      backdrop-filter: blur(10px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .overlay.open {
      opacity: 1;
      pointer-events: all;
    }
    .player-box {
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      width: 100%;
      max-width: 900px;
      overflow: hidden;
      transform: scale(0.95);
      transition: transform 0.2s;
    }
    .overlay.open .player-box { transform: scale(1); }

    .player-screen {
      background: #000;
      aspect-ratio: 16/9;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .player-screen video {
      width: 100%;
      height: 100%;
      display: none;
    }
    .spinner-wrap {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--faint);
      background: #000;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(255,255,255,0.08);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    .spinner-text { font-size: 11px; }

    .error-screen {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: #000;
      color: var(--muted);
    }
    .error-screen.show { display: flex; }
    .error-screen-icon { font-size: 32px; }
    .error-screen-msg { font-size: 13px; text-align: center; }
    .try-backup-btn {
      background: rgba(163,113,247,0.12);
      border: 1px solid rgba(163,113,247,0.3);
      color: var(--purple);
      border-radius: 6px;
      padding: 7px 16px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .try-backup-btn:hover { background: rgba(163,113,247,0.2); }

    /* Congestion toast */
    .congestion-toast {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0,0,0,0.82);
      backdrop-filter: blur(6px);
      border-top: 1px solid rgba(255,200,80,0.2);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      transform: translateY(100%);
      transition: transform 0.25s ease;
      z-index: 10;
    }
    .congestion-toast.show { transform: translateY(0); }
    .congestion-toast-icon { font-size: 16px; flex-shrink: 0; }
    .congestion-toast-msg { font-size: 12px; color: rgba(255,200,80,0.9); flex: 1; }
    .congestion-toast-btn {
      background: rgba(255,200,80,0.12);
      border: 1px solid rgba(255,200,80,0.3);
      color: rgb(255,200,80);
      border-radius: 6px;
      padding: 5px 12px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      flex-shrink: 0;

<script src="https://cdn.jsdelivr.net/npm/mpegts.js@latest/dist/mpegts.min.js"></script>
<script>
// ── State ────────────────────────────────────────────────────────────────────
let groups = [];           // [{id, name, flag, channels:[...]}]
let allChannels = [];      // flat list
let customChannels = [];   // [{id, name, url}]
let favorites = new Set(); // channel_ids
let recentIds = [];        // channel_ids ordered newest first
let pinnedGroups = new Set(JSON.parse(localStorage.getItem('mb-pinned-groups') || '[]'));

let activeGroup = 'all';
let currentChannelId = null;
let activeStreamIdx = 0;
let searchFocusIdx = -1;
let hlsInstance = null;

// ── Congestion detection state ────────────────────────────────────────────────
let _stallTimestamps = [];       // rolling window of stall event times
let _stallSustainTimer = null;   // fires if stall lasts > 5s continuously
let _congestionDismissed = false;// user dismissed toast for this stream session
let _congestionShowCount = 0;    // auto-suppress after showing too many times
let _playingGraceTimer = null;   // debounce hide on 'playing' events
let _congestionAbort = null;     // AbortController to detach listeners on stream switch

// ── Bootstrap ────────────────────────────────────────────────────────────────
async function init() {
  try {
    const [meResp, chResp, favResp, recentResp, customResp] = await Promise.all([
      fetch('/api/me'),
      fetch('/api/channels'),
      fetch('/api/favorites'),
      fetch('/api/recent'),
      fetch('/api/custom-channels'),
    ]);

    if (meResp.status === 401) { window.location.href = '/login'; return; }

    const me = await meResp.json();
    document.getElementById('usernameDisplay').textContent = me.username;
    if (me.is_admin) document.getElementById('settingsBtn').style.display = '';
    refreshActiveUsers();

    const chData = await chResp.json();
    groups = chData.groups || [];
    customChannels = await customResp.json();
    mergeCustomChannels();
    allChannels = groups.flatMap(g => g.channels.map(ch => ({...ch, groupId: g.id, groupName: g.name, groupFlag: g.flag})));

    favorites = new Set(await favResp.json());
    recentIds = await recentResp.json();

    updateSidebar();
    renderGroupList();
    // Auto-select Favorites on load (it's the primary view)
    activeGroup = 'favorites';
    document.querySelectorAll('.group-item').forEach(el => {
      el.classList.toggle('active', el.dataset.group === 'favorites');
    });
    renderChannels();

  } catch (err) {
    console.error('Init error:', err);
    document.getElementById('channelList').innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">⚠️</div>
        <div>Failed to load channels. <a href="/login">Sign in again</a></div>
      </div>
    `;
  }
}


// ── Helpers ──────────────────────────────────────────────────────────────────
function findChannel(id) {
  return allChannels.find(c => c.id === id);
}

function bestStreamIdx(streams) {
  return 0;
}

function hl(text, q) {
  if (!q) return escHtml(text);
  const escaped = escHtml(text);
  const escapedQ = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return escaped.replace(new RegExp(`(${escapedQ})`, 'gi'), '<em>$1</em>');
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── Sidebar ──────────────────────────────────────────────────────────────────
function updateSidebar() {
  document.getElementById('allCount').textContent = allChannels.length;
  document.getElementById('favCount').textContent = favorites.size;
}

function renderGroupList() {
  const container = document.getElementById('groupList');
  const sorted = [...groups].sort((a, b) => {
    const ap = pinnedGroups.has(a.id) ? 0 : 1;
    const bp = pinnedGroups.has(b.id) ? 0 : 1;
    if (ap !== bp) return ap - bp;
    return a.name.localeCompare(b.name);
  });

  container.innerHTML = sorted.map(g => {
    const isPinned = pinnedGroups.has(g.id);
    const isActive = activeGroup === g.id;
    return `
      <div class="group-item ${isActive ? 'active' : ''}" data-group="${escHtml(g.id)}" onclick="setGroup('${escHtml(g.id)}', this)">
        <span class="group-flag">${g.flag}</span>
        <span class="group-name">${escHtml(g.name)}</span>
        <span class="group-count">${g.channels.length}</span>
        <button class="gfav-btn ${isPinned ? 'on' : ''}"
          onclick="event.stopPropagation(); togglePinGroup('${escHtml(g.id)}')"
          title="${isPinned ? 'Unpin' : 'Pin to top'}">★</button>
      </div>
    `;
  }).join('');
}

function togglePinGroup(gid) {
  if (pinnedGroups.has(gid)) {
    pinnedGroups.delete(gid);
  } else {
    pinnedGroups.add(gid);
  }
  localStorage.setItem('mb-pinned-groups', JSON.stringify([...pinnedGroups]));
  renderGroupList();
}

function setGroup(groupId, el) {
  activeGroup = groupId;
  document.querySelectorAll('.group-item').forEach(e => e.classList.remove('active'));
  if (el) el.classList.add('active');
  renderChannels();
}

// ── Channel list ──────────────────────────────────────────────────────────────
function renderChannels() {
  const list = document.getElementById('channelList');

  let displayGroups;

  if (activeGroup === 'favorites') {
    const favChannels = allChannels.filter(ch => favorites.has(ch.id));
    if (!favChannels.length) {
      list.innerHTML = `<div class="empty-state"><div class="empty-state-icon">☆</div><div>No favorites yet</div><div class="empty-state-hint">Browse <a href="#" onclick="setGroup('all', document.querySelector('[data-group=all]')); return false;">All Channels</a> and tap ★ to add some</div></div>`;
      return;
    }
    displayGroups = [{ id: 'fav-v', name: 'Favorites', flag: '⭐', channels: favChannels, virtual: true }];

  } else if (activeGroup === 'recent') {
    const recentChannels = recentIds.map(id => findChannel(id)).filter(Boolean);
    if (!recentChannels.length) {
      list.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🕐</div><div>Nothing watched yet</div></div>`;
      return;
    }
    displayGroups = [{ id: 'rec-v', name: 'Recently Watched', flag: '🕐', channels: recentChannels, virtual: true }];

  } else if (activeGroup === 'all') {
    displayGroups = [...groups].sort((a, b) => {
      const ap = pinnedGroups.has(a.id) ? 0 : 1;
      const bp = pinnedGroups.has(b.id) ? 0 : 1;
      if (ap !== bp) return ap - bp;
      return a.name.localeCompare(b.name);
    });

  } else {
    const found = groups.find(g => g.id === activeGroup);
    displayGroups = found ? [found] : [];
  }

  if (!displayGroups.length) {
    list.innerHTML = `<div class="empty-state"><div class="empty-state-icon">📺</div><div>No channels found</div></div>`;
    return;
  }

  list.innerHTML = '';
  displayGroups.forEach(group => {
    if (!group.channels.length) return;
    const sortedChannels = group.virtual
      ? group.channels
      : [...group.channels].sort((a, b) => {
          const af = favorites.has(a.id) ? 0 : 1;
          const bf = favorites.has(b.id) ? 0 : 1;
          return af - bf;
        });

    const isPinned = pinnedGroups.has(group.id);
    const sec = document.createElement('div');
    sec.className = 'g-section';
    sec.innerHTML = `
      <div class="g-header">
        <span class="g-flag">${group.flag}</span>
        <span class="g-name">${escHtml(group.name)}</span>
        <span class="g-count">${sortedChannels.length} channel${sortedChannels.length !== 1 ? 's' : ''}</span>
        ${!group.virtual ? `<button class="g-pin ${isPinned ? 'on' : ''}" onclick="togglePinGroup('${escHtml(group.id)}')" title="Pin to top">${isPinned ? '★' : '☆'}</button>` : ''}
        <button class="g-toggle" onclick="toggleCollapse(this, '${escHtml(group.id)}')">▾</button>
      </div>
      <div class="ch-list" id="cl-${escHtml(group.id)}">
        ${sortedChannels.map(ch => renderChannelRow(ch)).join('')}
      </div>
    `;
    list.appendChild(sec);
  });
}

function renderChannelRow(ch) {
  const hasBackups = (ch.streams || []).length > 1;
  const isFav = favorites.has(ch.id);
  const isPlaying = currentChannelId === ch.id;

  return `
    <div class="ch-row ${isPlaying ? 'active' : ''}" onclick="playChannel('${escHtml(ch.id)}')">
      <div class="ch-logo">${escHtml(ch.logo || '')}</div>
      <div class="ch-info">
        <div class="ch-name">${escHtml(ch.name)}</div>
        <div class="ch-show">${escHtml(ch.show || '')}</div>
      </div>
      <div class="ch-badges">
        ${isPlaying ? `<div class="ch-live"><div class="ch-live-dot"></div>LIVE</div>` : ''}
        ${hasBackups ? `<span class="backup-badge">+${ch.streams.length - 1}</span>` : ''}
      </div>
      <button class="ch-fav ${isFav ? 'on' : ''}"
        onclick="event.stopPropagation(); toggleFav('${escHtml(ch.id)}')"
        title="${isFav ? 'Remove favorite' : 'Add favorite'}">★</button>
    </div>
  `;
}

function toggleCollapse(btn, gid) {
  const el = document.getElementById('cl-' + gid);
  if (!el) return;
  const hidden = el.style.display === 'none';
  el.style.display = hidden ? '' : 'none';
  btn.textContent = hidden ? '▾' : '▸';
}

// ── Favorites ────────────────────────────────────────────────────────────────
async function toggleFav(channelId) {
  if (favorites.has(channelId)) {
    favorites.delete(channelId);
  } else {
    favorites.add(channelId);
  }
  updateSidebar();
  renderChannels();
  if (currentChannelId === channelId) {
    document.getElementById('pFav').className = `player-fav ${favorites.has(channelId) ? 'on' : ''}`;
  }

  try {
    await fetch(`/api/favorites/${channelId}`, { method: 'POST' });
  } catch (_) {}
}

async function toggleFavSearch(channelId, btn) {
  await toggleFav(channelId);
  btn.classList.toggle('on', favorites.has(channelId));
  btn.title = favorites.has(channelId) ? 'Remove favorite' : 'Add to favorites';
}

async function toggleCurrentFav() {
  if (!currentChannelId) return;
  await toggleFav(currentChannelId);
}

// ── Playback ─────────────────────────────────────────────────────────────────
let _heartbeatInterval = null;

function _startHeartbeat() {
  _stopHeartbeat();
  _heartbeatInterval = setInterval(() => {
    fetch('/api/stream/heartbeat', { method: 'POST' }).catch(() => {});
  }, 15000);
}

function _stopHeartbeat() {
  if (_heartbeatInterval) { clearInterval(_heartbeatInterval); _heartbeatInterval = null; }
}

async function playChannel(channelId) {
  const ch = findChannel(channelId);
  if (!ch) return;

  // Claim a stream slot — may be rejected if all slots are in use
  try {
    const res = await fetch('/api/stream/start', { method: 'POST' });
    if (res.status === 409) {
      const data = await res.json();
      alert(data.detail || 'All streams are currently in use. Try again later.');
      return;
    }
  } catch (_) {}

  currentChannelId = channelId;
  activeStreamIdx = bestStreamIdx(ch.streams || []);

  // Update recently watched
  recentIds = [channelId, ...recentIds.filter(r => r !== channelId)].slice(0, 10);
  try { await fetch(`/api/recent/${channelId}`, { method: 'POST' }); } catch (_) {}

  // Now bar
  document.getElementById('nowBar').style.display = 'flex';
  document.getElementById('nowName').textContent = ch.name;
  document.getElementById('nowShow').textContent = ch.show || '';

  // Player info
  document.getElementById('pLogo').textContent = ch.logo || '';
  document.getElementById('pName').textContent = ch.name;
  document.getElementById('pShow').textContent = ch.show || '';
  document.getElementById('pFav').className = `player-fav ${favorites.has(channelId) ? 'on' : ''}`;

  renderStreamPicker(ch);
  showSpinner();
  hideError();
  document.getElementById('overlay').classList.add('open');

  renderChannels();
  _startHeartbeat();

  await loadStream(channelId, activeStreamIdx);
}

async function loadStream(channelId, streamIdx) {
  const ch = findChannel(channelId);
  if (!ch) return;

  const streams = ch.streams || [];
  let url;

  if (streamIdx === activeStreamIdx && streamIdx === bestStreamIdx(streams)) {
    // Let the backend pick best URL
    try {
      const resp = await fetch(`/api/stream/${channelId}`);
      if (resp.ok) {
        const data = await resp.json();
        url = data.url;
      }
    } catch (_) {}
  }

  if (!url && streams[streamIdx]) {
    url = streams[streamIdx].url;
  }

  if (!url) {
    showError('No stream URL available');
    return;
  }

  startHls(url, ch, streamIdx);
}

function startHls(url, ch, streamIdx) {
  const vid = document.getElementById('vid');

  // Destroy existing player instance
  if (hlsInstance) {
    hlsInstance.destroy();
    hlsInstance = null;
  }

  vid.pause();
  vid.src = '';

  showSpinner();
  hideError();
  resetCongestionState();

  const isM3u8 = url.includes('.m3u8');
  const streams = ch.streams || [];
  const hasBackup = streams.length > streamIdx + 1;

  const type = url.includes('.m3u8') ? 'mse' : 'mpegts';

  if (mpegts.isSupported()) {
    hlsInstance = mpegts.createPlayer(
      { type, url, isLive: true },
      { enableWorker: false, lazyLoadMaxDuration: 3 * 60, seekType: 'range' }
    );
    hlsInstance.on(mpegts.Events.ERROR, (errType, errDetail, errInfo) => {
      hideSpinner();
      showError('Stream unavailable — network error', hasBackup);
    });
    hlsInstance.attachMediaElement(vid);
    hlsInstance.load();
    vid.style.display = 'block';
    vid.addEventListener('canplay', () => {
      hideSpinner();
      vid.play().catch(() => {});
    }, { once: true });
  } else {
    // Fallback: native (Safari HLS)
    vid.src = url;
    vid.style.display = 'block';
    vid.addEventListener('canplay', () => {
      hideSpinner();
      vid.play().catch(() => {});
    }, { once: true });
    vid.addEventListener('error', () => {
      hideSpinner();
      showError('Stream unavailable', hasBackup);
    }, { once: true });
  }

  attachCongestionListeners(hasBackup);
}

function tryNextBackup() {
  if (!currentChannelId) return;
  const ch = findChannel(currentChannelId);
  if (!ch) return;
  const streams = ch.streams || [];
  const nextIdx = activeStreamIdx + 1;
  if (nextIdx < streams.length) {
    activeStreamIdx = nextIdx;
    renderStreamPicker(ch);
    loadStream(currentChannelId, nextIdx);
  }
}

function switchStream(idx) {
  if (!currentChannelId) return;
  const ch = findChannel(currentChannelId);
  if (!ch) return;
  activeStreamIdx = idx;
  renderStreamPicker(ch);
  loadStream(currentChannelId, idx);
}

// ── Congestion detection ──────────────────────────────────────────────────────
function resetCongestionState() {
  if (_congestionAbort) { _congestionAbort.abort(); }
  _congestionAbort = new AbortController();
  _stallTimestamps = [];
  _congestionDismissed = false;
  _congestionShowCount = 0;
  clearTimeout(_stallSustainTimer);
  clearTimeout(_playingGraceTimer);
  _stallSustainTimer = null;
  _playingGraceTimer = null;
  document.getElementById('congestionToast').classList.remove('show');
  document.getElementById('congestionSwitchBtn').style.display = '';
}

function showCongestionToast(hasBackup) {
  if (_congestionDismissed) return;
  // Auto-suppress after 3 appearances — stream is clearly struggling, no need to keep nagging
  if (_congestionShowCount >= 3) { _congestionDismissed = true; return; }
  _congestionShowCount++;
  const toast = document.getElementById('congestionToast');
  document.getElementById('congestionSwitchBtn').style.display = hasBackup ? '' : 'none';
  toast.classList.add('show');
}

function hideCongestionToast() {
  document.getElementById('congestionToast').classList.remove('show');
}

function dismissCongestionToast() {
  _congestionDismissed = true;
  hideCongestionToast();
}

function congestionTryBackup() {
  hideCongestionToast();
  tryNextBackup();
}

function attachCongestionListeners(hasBackup) {
  const vid = document.getElementById('vid');

  vid.addEventListener('waiting', function onWaiting() {
    if (_congestionDismissed) return;
    const now = Date.now();
    _stallTimestamps.push(now);
    // Keep only stalls in the last 30 seconds
    _stallTimestamps = _stallTimestamps.filter(t => now - t < 30000);

    // 3+ stalls in 30s → show toast
    if (_stallTimestamps.length >= 3) {
      showCongestionToast(hasBackup);
    }

    // If stall sustains for 5s → show toast immediately
    clearTimeout(_stallSustainTimer);
    _stallSustainTimer = setTimeout(() => {
      if (vid.readyState < 3) showCongestionToast(hasBackup);
    }, 5000);
  }, { signal: _congestionAbort.signal });

  vid.addEventListener('playing', function onPlaying() {
    clearTimeout(_stallSustainTimer);
    _stallSustainTimer = null;
    // Grace period: hide toast only if playback stays stable for 3s
    clearTimeout(_playingGraceTimer);
    _playingGraceTimer = setTimeout(hideCongestionToast, 3000);
  }, { signal: _congestionAbort.signal });
}

function reopenPlayer(e) {
  if (e.target.closest('.now-stop')) return;
  if (currentChannelId) document.getElementById('overlay').classList.add('open');
}

function maybeClose(e) {
  if (e.target === document.getElementById('overlay')) closePlayer();
}

searchInput.addEventListener('input', renderDropdown);

});

searchInput.addEventListener('blur', () => {
  setTimeout(() => {
    searchDropdown.classList.remove('open');
    searchKbd.style.display = '';

});

searchInput.addEventListener('keydown', e => {
  const items = searchDropdown.querySelectorAll('.search-item');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    moveFocus(1, items);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    moveFocus(-1, items);
  } else if (e.key === 'Enter') {
    const focused = searchDropdown.querySelector('.search-item.focused');
    if (focused) focused.click();
  } else if (e.key === 'Escape') {
    searchInput.blur();
  }
});

function moveFocus(d, items) {
  searchFocusIdx = Math.max(-1, Math.min(items.length - 1, searchFocusIdx + d));
  items.forEach((el, i) => el.classList.toggle('focused', i === searchFocusIdx));
}

// Maps English/common names and country codes → Icelandic group name
const COUNTRY_ALIASES = {
  'iceland': 'ísland', 'is': 'ísland',
  'norway': 'noregur', 'norge': 'noregur', 'no': 'noregur',
  'sweden': 'svíþjóð', 'sverige': 'svíþjóð', 'se': 'svíþjóð',
  'denmark': 'danmörk', 'danmark': 'danmörk', 'dk': 'danmörk',
  'uk': 'bretland', 'britain': 'bretland', 'england': 'bretland', 'gb': 'bretland',
  'greece': 'grikkland', 'hellas': 'grikkland', 'gr': 'grikkland',
  'germany': 'þýskaland', 'deutschland': 'þýskaland', 'de': 'þýskaland',
  'france': 'frakkland', 'fr': 'frakkland',
  'spain': 'spánn', 'espana': 'spánn', 'españa': 'spánn', 'es': 'spánn',
  'italy': 'ítalía', 'italia': 'ítalía', 'it': 'ítalía',
  'netherlands': 'holland', 'dutch': 'holland', 'nl': 'holland',
  'poland': 'pólland', 'polska': 'pólland', 'pl': 'pólland',
  'portugal': 'portúgal', 'pt': 'portúgal',
  'usa': 'bandaríkin', 'us': 'bandaríkin', 'america': 'bandaríkin',
  'australia': 'ástralía', 'au': 'ástralía',
};

// Normalize: lowercase + strip diacritics so "rúv" matches "RÚV", "ruv" matches "RÚV" etc.
function norm(str) {
  return str.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}

function scoreChannel(ch, rawQ) {
  const q = norm(rawQ);
  // Strip country prefix (e.g. "NO: NRK 1 HD" → "nrk 1 hd") for matching
  const stripped = norm(ch.name).replace(/^[a-z]{2}\s*:\s*/, '');
  const full = norm(ch.name);
  const show = norm(ch.show || '');
  const group = norm(ch.groupName || '');

  if (stripped === q || full === q) return 100;
  if (stripped.startsWith(q)) return 80;
  if (full.startsWith(q)) return 70;
  if (stripped.includes(q)) return 60;
  if (full.includes(q)) return 50;
  if (show.includes(q)) return 30;
  if (group.includes(q)) return 40;

  // Word-boundary match: any word in the name starts with query
  const words = stripped.split(/\s+/);
  if (words.some(w => w.startsWith(q))) return 55;

  // Country alias match: "greece" / "grikkland" → all channels in that group
  const mappedGroup = COUNTRY_ALIASES[q];
  if (mappedGroup && group === norm(mappedGroup)) return 40;
  for (const [alias, mapped] of Object.entries(COUNTRY_ALIASES)) {
    if (alias.startsWith(q) && group === norm(mapped)) return 35;
  }

  return 0;
}

function formatMinsUntil(mins) {
  if (mins < 60) return `in ${mins}min`;
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  return m ? `in ${h}h ${m}min` : `in ${h}h`;
}

function renderChannelResult(ch, q) {
  return `
    <div class="search-item" onclick="selectSearch('${escHtml(ch.id)}')">
      <div class="search-item-logo">${escHtml(ch.logo || '')}</div>
      <div class="search-item-info">
        <div class="search-item-name">${hl(ch.name.replace(/^[A-Z]{2}\s*:\s*/, ''), q)}</div>
        <div class="search-item-meta">${escHtml(ch.groupName || '')}</div>
      </div>
      <div class="search-item-right">
        <span class="search-item-group">${ch.groupFlag || ''} ${escHtml(ch.groupName || '')}</span>
        <button class="search-fav-btn ${favorites.has(ch.id) ? 'on' : ''}"
          onclick="event.stopPropagation(); toggleFavSearch('${escHtml(ch.id)}', this)"
          title="${favorites.has(ch.id) ? 'Remove favorite' : 'Add to favorites'}">★</button>
      </div>
    </div>`;
}

function renderEpgResult(r, q) {
  const chName = r.channel_name.replace(/^[A-Z]{2}\s*:\s*/, '');
  const timeStr = r.live ? '● LIVE' : formatMinsUntil(r.minutes_until);
  return `
    <div class="search-item" onclick="selectSearch('${escHtml(r.channel_id)}')">
      <div class="search-item-logo">${escHtml(chName.slice(0, 4).toUpperCase())}</div>
      <div class="search-item-info">
        <div class="search-item-name">${hl(r.title, q)}</div>
        <div class="search-item-meta">${escHtml(chName)}</div>
      </div>
      <div class="search-item-right">
        <span class="epg-time ${r.live ? 'live' : ''}">${timeStr}</span>
      </div>
    </div>`;
}

async function renderDropdown() {
  const rawQ = searchInput.value.trim();
  const q = norm(rawQ);
  if (!q) { searchDropdown.classList.remove('open'); return; }
  searchFocusIdx = -1;

  const chResults = allChannels
    .map(ch => ({ ch, score: scoreChannel(ch, rawQ) }))
    .filter(x => x.score > 0)
    .sort((a, b) => b.score - a.score)
    .slice(0, 8)
    .map(x => x.ch);

  // Render channel results immediately (no waiting)
  let html = '';
  if (chResults.length) {
    html += `<div class="search-results-label">Channels</div>`;
    html += chResults.map(ch => renderChannelResult(ch, q)).join('');
  }
  html += renderCustomSection(rawQ, q);
  searchDropdown.innerHTML = html || `<div class="search-no-results">Searching…</div>`;
  searchDropdown.classList.add('open');

  // Fetch EPG results in parallel
  try {
    const resp = await fetch(`/api/epg/search?q=${encodeURIComponent(rawQ)}`);
    if (searchInput.value.trim() !== rawQ) return; // Query changed while fetching
    const epgResults = await resp.json();

    let newHtml = '';
    if (chResults.length) {
      newHtml += `<div class="search-results-label">Channels</div>`;
      newHtml += chResults.map(ch => renderChannelResult(ch, q)).join('');
    }
    if (epgResults.length) {
      newHtml += `<div class="search-results-label">On Now &amp; Coming Up</div>`;
      newHtml += epgResults.slice(0, 8).map(r => renderEpgResult(r, q)).join('');
    }
    if (!chResults.length && !epgResults.length) {
      newHtml = `<div class="search-no-results">Not in your lineup — searching provider…</div>`;
      searchProviderChannels(rawQ);
    }
    newHtml += renderCustomSection(rawQ, q);
    searchDropdown.innerHTML = newHtml;
    searchDropdown.classList.add('open');
  } catch (_) {
    // EPG unavailable — still show channel results
    if (!chResults.length) {
      searchDropdown.innerHTML = `<div class="search-no-results">Not in your lineup — searching provider…</div>`;
      searchProviderChannels(rawQ);
    }
  }
}

function renderCustomSection(rawQ, q) {
  const matched = customChannels.filter(c => norm(c.name).includes(q));
  let html = `<div class="search-results-label">Custom Channels</div>`;
  html += matched.map(c => `
    <div class="search-item" onclick="selectSearch('custom-${c.id}')">
      <div class="search-item-logo">${escHtml(c.name.slice(0,4).toUpperCase())}</div>
      <div class="search-item-info">
        <div class="search-item-name">${hl(c.name, q)}</div>
        <div class="search-item-meta">Custom</div>
      </div>
    </div>`).join('');
  html += `<div class="search-add-row" onclick="openAddChannel(${JSON.stringify(rawQ)})">
    <div class="search-add-icon">+</div>
    <span>Add "${escHtml(rawQ)}" as custom channel</span>
  </div>`;
  return html;
}

function selectSearch(channelId) {
  searchInput.value = '';
  searchDropdown.classList.remove('open');
  searchInput.blur();
  playChannel(channelId);
}

async function searchProviderChannels(q) {
  try {
    const resp = await fetch(`/api/provider-search?q=${encodeURIComponent(q)}`);
    const results = await resp.json();
    // Only update if the query hasn't changed
    if (searchInput.value.trim() !== q) return;
    if (!results.length) {
      searchDropdown.innerHTML = `<div class="search-no-results">No channels found for "<strong>${escHtml(q)}</strong>"</div>`;
    } else {
      searchDropdown.innerHTML = `
        <div class="search-results-label">From provider — not in your lineup</div>
        ${results.map(ch => `
          <div class="search-item provider-result">
            <div class="search-item-logo">${escHtml(ch.name.slice(0,4).toUpperCase())}</div>
            <div class="search-item-info">
              <div class="search-item-name">${hl(ch.name.replace(/^[A-Z]{2}\s*:\s*/, ''), q)}</div>
              <div class="search-item-meta">${escHtml(ch.group)}</div>
            </div>
            <div class="search-item-right">
              <button class="search-add-btn-inline" onclick="addProviderChannel(${ch.id}, '${escHtml(ch.name)}', '${escHtml(ch.url)}')">+ Add</button>
            </div>
          </div>
        `).join('')}
      `;
    }
  } catch (_) {
    searchDropdown.innerHTML = `<div class="search-no-results">Provider search unavailable</div>`;
  }
}

async function addProviderChannel(providerId, name, url) {
  const fd = new FormData();
  fd.append('name', name);
  fd.append('url', url);
  try {
    const resp = await fetch('/api/custom-channels', { method: 'POST', body: fd });
    if (!resp.ok) throw new Error();
    const ch = await resp.json();
    customChannels.push(ch);
    mergeCustomChannels();
    allChannels = groups.flatMap(g => g.channels.map(c => ({...c, groupId: g.id, groupName: g.name, groupFlag: g.flag})));
    renderGroupList();
    renderChannels();
    searchInput.value = '';
    searchDropdown.classList.remove('open');
  } catch (_) {
    alert('Failed to add channel.');
  }
}

// ── Custom Channels ───────────────────────────────────────────────────────────

function mergeCustomChannels() {
  if (!customChannels.length) return;
  const customGroup = {
    id: 'custom',
    name: 'Custom',
    flag: '📡',
    channels: customChannels.map(c => ({
      id: 'custom-' + c.id,
      _customId: c.id,
      name: c.name,
      logo: c.name.slice(0, 4).toUpperCase(),
      show: '',
      group: 'Custom',
      streams: [{ label: 'Primary', url: c.url, health: 'unknown' }],
    })),
  };
  groups = groups.filter(g => g.id !== 'custom');
  groups.push(customGroup);
}

function openAddChannel(prefill = '') {
  document.getElementById('addChName').value = prefill;
  document.getElementById('addChUrl').value = '';
  document.getElementById('addChOverlay').classList.add('open');
  setTimeout(() => document.getElementById(prefill ? 'addChUrl' : 'addChName').focus(), 50);
}

function closeAddChannel(e) {
  if (e && e.target !== document.getElementById('addChOverlay')) return;
  document.getElementById('addChOverlay').classList.remove('open');
}

async function submitAddChannel() {
  const name = document.getElementById('addChName').value.trim();
  const url = document.getElementById('addChUrl').value.trim();
  if (!name || !url) return;

  const fd = new FormData();
  fd.append('name', name);
  fd.append('url', url);

  try {
    const resp = await fetch('/api/custom-channels', { method: 'POST', body: fd });
    if (!resp.ok) throw new Error();
    const ch = await resp.json();
    customChannels.push(ch);
    mergeCustomChannels();
    allChannels = groups.flatMap(g => g.channels.map(c => ({...c, groupId: g.id, groupName: g.name, groupFlag: g.flag})));
    renderGroupList();
    renderChannels();
    document.getElementById('addChOverlay').classList.remove('open');
  } catch (_) {
    alert('Failed to add channel.');
  }
}

async function openSettings() {
  document.getElementById('newUserResult').style.display = 'none';
  document.getElementById('newUsername').value = '';

  await loadUsers();

function closeSettings(e) {

async function loadUsers() {
  const resp = await fetch('/api/admin/users');
  const users = await resp.json();
  document.getElementById('userList').innerHTML = users.map(u => `
    <div class="user-row">
      <div class="user-row-info">
        <div style="display:flex;align-items:center;gap:6px">
          <span class="user-row-name">${escHtml(u.username)}</span>
          ${u.is_admin ? '<span class="user-row-admin">admin</span>' : ''}

      ${u.is_admin ? '' : `<button class="user-del-btn" onclick="deleteUser(${u.id})" title="Remove">✕</button>`}

async function deleteUser(id) {
  if (!confirm('Remove this user?')) return;
  await fetch(`/api/admin/users/${id}`, { method: 'DELETE' });
  await loadUsers();
}

async function createUser() {
  const username = document.getElementById('newUsername').value.trim();
  if (!username) return;
  const fd = new FormData();
  fd.append('username', username);
  const resp = await fetch('/api/admin/users', { method: 'POST', body: fd });
  if (!resp.ok) {
    const err = await resp.json();
    alert(err.detail || 'Failed to create user');
    return;
  }
  const user = await resp.json();
  document.getElementById('newUsername').value = '';
  const resultEl = document.getElementById('newUserResult');
  resultEl.style.display = '';
  resultEl.innerHTML = `
    <div class="new-user-creds">
      <strong>${escHtml(user.username)}</strong> — password: <strong>${escHtml(user.password)}</strong>

      Copy login details
    </button>
  `;
  await loadUsers();
}

    e.preventDefault();

function toggleFullscreen() {
  const screen = document.querySelector('.player-screen');
  if (!document.fullscreenElement) {
    screen.requestFullscreen().catch(() => {});
  } else {
    document.exitFullscreen();
  }
}

document.addEventListener('fullscreenchange', () => {
  const vid = document.getElementById('vid');
  const screen = document.querySelector('.player-screen');

  // If the video itself went fullscreen (native button), redirect to player-screen
  // so that the congestion toast and overlays remain visible
  if (document.fullscreenElement === vid) {
    document.exitFullscreen().then(() => {
      screen.requestFullscreen().catch(() => {});
    });
    return;
  }

  const btn = document.getElementById('fsBtn');
  if (btn) btn.textContent = document.fullscreenElement ? '✕ Exit' : '⛶';
});
