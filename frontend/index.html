<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mediabox — Login</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
      animation: fadeIn 0.25s ease;
    }

    .login-brand {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-icon {
      font-size: 40px;
      display: block;
      margin-bottom: 12px;
    }

    .login-title {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--purple) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .login-sub {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 11px 14px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }

    .form-input::placeholder { color: var(--faint); }

    .form-input:focus {
      border-color: rgba(88,166,255,0.5);
      background: rgba(88,166,255,0.04);
    }

    .login-btn {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      background: linear-gradient(135deg, var(--accent), var(--purple));
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    .login-btn:hover { opacity: 0.9; }
    .login-btn:active { transform: scale(0.98); }

    .login-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .error-box {
      background: rgba(248,81,73,0.08);
      border: 1px solid rgba(248,81,73,0.25);
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 16px;
      color: var(--red);
      font-size: 13px;
      display: none;
      animation: fadeIn 0.2s ease;
    }

    .error-box.show { display: block; }

    .spinner-inline {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-brand">
      <span class="login-icon">📺</span>
      <div class="login-title">Mediabox</div>
      <div class="login-sub">Self-hosted live TV</div>
    </div>

    <div class="error-box" id="errorBox"></div>

    <form id="loginForm" action="/api/auth/login" method="post">
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input
          class="form-input"
          id="username"
          name="username"
          type="text"
          placeholder="Enter your username"
          autocomplete="username"
          required
          autofocus
        >
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input
          class="form-input"
          id="password"
          name="password"
          type="password"
          placeholder="Enter your password"
          autocomplete="current-password"
          required
        >
      </div>

      <button class="login-btn" type="submit" id="loginBtn">
        Sign in
      </button>
    </form>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const errorBox = document.getElementById('errorBox');
    const loginBtn = document.getElementById('loginBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorBox.classList.remove('show');
      loginBtn.disabled = true;
      loginBtn.innerHTML = '<span class="spinner-inline"></span>Signing in…';

      const formData = new FormData(form);

      try {
        const resp = await fetch('/api/auth/login', {
          method: 'POST',
          body: new URLSearchParams(formData),
          redirect: 'manual',
        });

        if (resp.type === 'opaqueredirect' || resp.status === 302 || resp.ok) {
          window.location.href = '/';
          return;
        }

        let msg = 'Invalid username or password';
        try {
          const data = await resp.json();
          msg = data.detail || msg;
        } catch (_) {}

        showError(msg);
      } catch (err) {
        showError('Network error — please try again');
      }
    });

    function showError(msg) {
      errorBox.textContent = msg;
      errorBox.classList.add('show');
      loginBtn.disabled = false;
      loginBtn.textContent = 'Sign in';
    }
  </script>
</body>
</html>
