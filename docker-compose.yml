services:
  threadfin:
    image: fyb3roptik/threadfin:latest
    container_name: threadfin
    restart: unless-stopped
    ports:
      - "34400:34400"
    environment:
      - THREADFIN_PORT=34400
      - THREADFIN_HOST=100.104.189.115
    volumes:
      - ./config/threadfin:/home/threadfin/conf

  plex:
    image: plexinc/pms-docker:latest
    container_name: plex
    restart: unless-stopped
    network_mode: host
    environment:
      - PLEX_CLAIM=${PLEX_CLAIM}
      - PLEX_UID=1000
      - PLEX_GID=1000
      - TZ=Atlantic/Reykjavik
    volumes:
      - ./config/plex:/config
      - /home/oli/media/tv:/data/tv
      - /home/oli/media/movies:/data/movies
      - /tmp/plex-transcode:/transcode

  mediabox-ui:
    build: .
    container_name: mediabox-ui
    restart: unless-stopped
    ports:
      - "8888:8888"
    volumes:
      - ./data:/data
    environment:
      - THREADFIN_URL=http://100.104.189.115:34400
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - threadfin

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "6881:6881"
      - "6881:6881/udp"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Atlantic/Reykjavik
      - WEBUI_PORT=8080
    volumes:
      - ./config/qbittorrent:/config
      - /home/oli/media:/media

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    restart: unless-stopped
    ports:
      - "9696:9696"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Atlantic/Reykjavik
    volumes:
      - ./config/prowlarr:/config

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    ports:
      - "7878:7878"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Atlantic/Reykjavik
    volumes:
      - ./config/radarr:/config
      - /home/oli/media:/media

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    restart: unless-stopped
    ports:
      - "8989:8989"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Atlantic/Reykjavik
    volumes:
      - ./config/sonarr:/config
      - /home/oli/media:/media
